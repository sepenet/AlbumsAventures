{% extends "base.html" %}
{% block title %}Mot de passe oublié | AlbumsAventures{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12 px-4">
    <div class="w-full max-w-md" x-data="forgotPasswordForm()">
        <!-- Card -->
        <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8 border border-gray-200 dark:border-gray-700">
            <!-- Header -->
            <div class="text-center mb-8">
                <div class="mx-auto w-16 h-16 bg-gradient-to-br from-sky-400 to-blue-600 rounded-full flex items-center justify-center mb-4">
                    <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-gray-900 dark:text-white">
                    Mot de passe oublié ?
                </h1>
                <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">
                    Entrez votre adresse email et nous vous enverrons un lien pour réinitialiser votre mot de passe.
                </p>
            </div>

            <!-- Message de succès -->
            <div x-show="success" x-cloak
                 x-transition:enter="transition ease-out duration-300"
                 class="mb-6 bg-green-100 dark:bg-green-900/30 border border-green-400 dark:border-green-700 text-green-700 dark:text-green-400 px-4 py-3 rounded-lg">
                <div class="flex items-center space-x-2">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span x-text="successMessage"></span>
                </div>
            </div>

            <!-- Message d'erreur -->
            <div x-show="error" x-cloak
                 class="mb-6 bg-red-100 dark:bg-red-900/30 border border-red-400 dark:border-red-700 text-red-700 dark:text-red-400 px-4 py-3 rounded-lg">
                <div class="flex items-center space-x-2">
                    <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <span x-text="error"></span>
                </div>
            </div>

            <!-- Formulaire -->
            <form @submit.prevent="submitForm" x-show="!success">
                <!-- Email -->
                <div class="mb-6">
                    <label for="email" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">
                        Adresse email
                    </label>
                    <input 
                        type="email" 
                        id="email"
                        x-model="email"
                        required
                        autocomplete="email"
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-white placeholder-gray-400 focus:ring-2 focus:ring-sky-500 focus:border-transparent transition duration-200"
                        placeholder="votre@email.com"
                    >
                </div>

                <!-- Bouton submit -->
                <button 
                    type="submit"
                    :disabled="loading"
                    class="w-full py-3 px-4 bg-gradient-to-r from-sky-500 to-blue-600 hover:from-sky-600 hover:to-blue-700 text-white font-medium rounded-lg shadow-lg hover:shadow-xl transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center space-x-2"
                >
                    <span x-show="!loading">Envoyer le lien de réinitialisation</span>
                    <span x-show="loading" class="flex items-center space-x-2">
                        <svg class="animate-spin h-5 w-5" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                        <span>Envoi en cours...</span>
                    </span>
                </button>
            </form>

            <!-- Lien retour login -->
            <div class="mt-6 text-center">
                <a href="/login" class="text-sm text-sky-600 dark:text-sky-400 hover:text-sky-800 dark:hover:text-sky-300 transition duration-200">
                    ← Retour à la connexion
                </a>
            </div>
        </div>
    </div>
</div>

<script>
function forgotPasswordForm() {
    return {
        email: '',
        loading: false,
        error: null,
        success: false,
        successMessage: '',

        async submitForm() {
            this.loading = true;
            this.error = null;

            try {
                const response = await fetch('/be_auth/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: this.email })
                });

                const data = await response.json();

                if (response.ok) {
                    this.success = true;
                    this.successMessage = data.message;
                } else {
                    this.error = data.detail || "Une erreur est survenue";
                }
            } catch (e) {
                this.error = "Impossible de contacter le serveur. Réessayez plus tard.";
                console.error('Erreur:', e);
            } finally {
                this.loading = false;
            }
        }
    }
}
</script>
{% endblock %}
