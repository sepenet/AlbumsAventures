{% extends "base.html" %}

{% block title %}Album partagé — Albums Aventures{% endblock %}

{% block content %}
<div class="py-6 max-w-lg mx-auto">
  <div class="bg-white dark:bg-gray-800 rounded-lg shadow-md p-6">
    <div class="text-center mb-6">
      <svg class="mx-auto h-12 w-12 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z"/>
      </svg>
      <h1 class="mt-4 text-xl font-bold text-gray-900 dark:text-gray-100">Album partagé</h1>
      <p class="mt-2 text-sm text-gray-600 dark:text-gray-400">Saisissez le code PIN pour accéder à cet album.</p>
    </div>

    {% if error %}
    <div class="mb-4 p-3 bg-red-50 dark:bg-red-900/30 border border-red-200 dark:border-red-800 rounded-lg">
      <p class="text-sm text-red-700 dark:text-red-300">{{ error }}</p>
    </div>
    {% endif %}

    <form method="POST" action="/album/shared?token={{ token }}">
      <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Code PIN (6 caractères)</label>
      <input
        type="text"
        name="pin"
        maxlength="6"
        placeholder="ABC123"
        autocomplete="off"
        required
        pattern="[A-Za-z0-9]{6}"
        class="w-full px-4 py-3 text-center text-2xl font-mono tracking-[0.5em] uppercase border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 focus:ring-2 focus:ring-green-500 focus:border-green-500"
      />
      <input type="hidden" name="token" value="{{ token }}" />
      <button
        type="submit"
        class="mt-4 w-full px-4 py-3 bg-green-600 hover:bg-green-700 text-white font-medium rounded-lg transition-colors"
      >
        Accéder à l'album
      </button>
    </form>
  </div>
</div>
{% endblock %}
